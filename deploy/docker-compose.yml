# Local full-stack Sentinel AI: the API gateway (agent fleet + read-API), its messaging/storage
# infrastructure, and observability. Run from the repo root:
#
#   docker compose -f deploy/docker-compose.yml up --build
#
# Then open:
#   http://localhost:8000        the live dashboard
#   http://localhost:8000/metrics Prometheus-format metrics
#   http://localhost:9090        Prometheus
#   http://localhost:3000        Grafana (admin/admin)
#
# Scope note: api-gateway runs with the in-memory event bus by default (a single-process,
# single-intersection deployment, which is what the analytical-twin demo needs). RabbitMQ,
# Redis and Postgres are provisioned here because the messaging/config layer already targets
# them (see libs/sentinel/messaging and libs/sentinel/config) -- wiring the fleet to the
# distributed transports for a real multi-service deployment is a configuration change in
# sentinel.fleet.build_fleet, not a new architecture.

services:
  api-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api_gateway
    ports:
      - "8000:8000"
      - "9100:9100"
    environment:
      SENTINEL_ENVIRONMENT: production
      SENTINEL_RABBITMQ__HOST: rabbitmq
      SENTINEL_REDIS__HOST: redis
      SENTINEL_POSTGRES__HOST: postgres
      SENTINEL_OBS__LOG_JSON: "true"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672" # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - sentinel-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api-gateway

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - sentinel-grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  sentinel-postgres-data:
  sentinel-grafana-data:
